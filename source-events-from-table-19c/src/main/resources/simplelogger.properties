# SLF4J Simple Logger Configuration
# Set the default log level to INFO
org.slf4j.simpleLogger.defaultLogLevel=info

# Enable debug logging for MessageHandler to see detailed JSON debugging
org.slf4j.simpleLogger.log.com.oracle.osd.processors.MessageHandler=debug

# Show date and time in logs
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# Show thread name
org.slf4j.simpleLogger.showThreadName=true

# Show logger name (class name)
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.showShortLogName=true

# Disable colors in output to avoid the red INFO messages
org.slf4j.simpleLogger.levelInBrackets=true

# Log to stdout instead of stderr
org.slf4j.simpleLogger.logFile=System.out
